<p-toolbar styleClass="bg-transparent border-none p-0 mb-3">
  <ng-template pTemplate="start">
    <button
      (click)="onMenuClick.emit()"
      class="w-10 h-10 flex items-center justify-center text-black active:opacity-40 transition-all"
    >
      <i class="pi pi-ellipsis-h text-xl"></i>
    </button>
  </ng-template>

  <ng-template pTemplate="center">
    <div class="flex items-center gap-1">
      <button
        (click)="onNavigate.emit(-1)"
        class="w-8 h-8 flex items-center justify-center rounded-full hover:bg-stone-100 active:scale-90 transition-all text-stone-400 hover:text-black"
      >
        <i class="pi pi-chevron-left text-xs"></i>
      </button>

      <div
        class="flex items-center rounded-full border border-stone-200 bg-stone-50 shadow-sm transition-all"
      >
        <button
          (click)="onTodayClick.emit()"
          class="flex items-center gap-1 pl-5 pe-2 py-2 active:bg-stone-100 transition-colors group border-r border-stone-200"
        >
          <i
            class="pi pi-calendar text-sm text-awakin-sun group-hover:rotate-12 transition-transform"
          ></i>
          <span
            class="text-sm font-bold tracking-wide capitalize text-gray-800 min-w-[60px] text-center"
          >
            {{ currentLabel() }}
          </span>
        </button>

        <button
          (click)="onToggleView.emit()"
          class="px-4 py-2 hover:bg-stone-100 active:bg-stone-200 transition-colors flex items-center justify-center group"
        >
          <i
            class="pi pi-chevron-down inline-block transform transition-all duration-300 text-[10px] text-stone-400 group-hover:text-awakin-sun"
            [ngClass]="{ 'rotate-180': isMonthView() }"
          ></i>
        </button>
      </div>

      <button
        (click)="onNavigate.emit(1)"
        class="w-8 h-8 flex items-center justify-center rounded-full hover:bg-stone-100 active:scale-90 transition-all text-stone-400 hover:text-black"
      >
        <i class="pi pi-chevron-right text-xs"></i>
      </button>
    </div>
  </ng-template>

  <ng-template pTemplate="end">
    <div class="flex items-center gap-1.5 pr-2">
      <i
        class="pi pi-bolt text-xl"
        [ngClass]="streak() > 0 ? 'text-awakin-sun animate-pulse' : 'text-stone-300'"
      ></i>
      <span
        class="text-xl font-bold font-mono"
        [ngClass]="streak() > 0 ? 'text-black' : 'text-stone-400'"
      >
        {{ streak() }}
      </span>
    </div>
  </ng-template>
</p-toolbar>

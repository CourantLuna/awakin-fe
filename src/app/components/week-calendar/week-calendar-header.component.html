<div class="w-full pb-6 px-4 rounded-b-3xl shadow-2xl bg-white border-b border-stone-100">


  <div class="flex justify-between items-start px-1 select-none"
       (touchstart)="handleTouchStart($event)"
       (touchend)="handleTouchEnd($event)">
    
    <div *ngFor="let day of days()" 
         class="flex flex-col items-center gap-3 w-10 cursor-pointer"
         (click)="selectDay(day)">
      
      <span class="text-[10px] font-bold uppercase tracking-wider"
            [ngClass]="isSelected(day) ? 'text-black' : 'text-stone-400'">
        {{ day.dayName }}
      </span>

      <div class="w-9 h-9 flex items-center justify-center text-sm font-bold rounded-full transition-all duration-300"
           [ngClass]="getNumberClasses(day)">
        {{ day.date }}
      </div>

      <div class="w-1.5 h-1.5 rounded-full mt-1 transition-all"
           [ngClass]="getStatusClasses(day)">
      </div>
    </div>
  </div>
</div>

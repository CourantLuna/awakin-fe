<div class="bg-white rounded-3xl p-4 md:p-6 shadow-xl border border-stone-100 relative overflow-hidden mb-6 max-w-[400px] mx-auto">
    <app-intake-progress-widget 
    [consumed]="(proteinEated()*4) + (carbsEated()*4) + (fatsEated()*9) - burnedKcals() "
     [minA]="minA()" [goalB]="targetGoal()" [maintC]="maintC()">
    </app-intake-progress-widget>

    <div class="flex justify-center items-center mb-2 -mt-4">
        <p-chart type="doughnut" [data]="macroData()" [options]="macroOptions" class="w-24 h-24 md:w-32 md:h-32"></p-chart>
    </div>

    <div class="grid grid-cols-3 gap-4">

        <div class="flex flex-col items-center">
            <div class="flex items-baseline h-8">
                <span class="text-xl font-black text-gray-600 tracking-tighter tabular-nums me-1">
                    {{ proteinEated() }}
                </span>
                <span class="text-xl font-bold text-stone-300">/</span>
                <span class="text-module-intake font-black text-md">{{ proteinGoal() }}g</span>
            </div>
            <span class="text-[9px] text-awakin-stone uppercase font-bold tracking-wider">Proteína</span>
            <div class="w-8 h-1 rounded-full bg-module-intake mt-1 opacity-50 transition-all duration-500"></div>
        </div>

        <div class="flex flex-col items-center px-2">
            <div class="flex items-baseline h-8">
                <span class="text-xl font-black text-gray-600 tracking-tighter tabular-nums me-1">
                    {{ carbsEated() }}
                </span>
                <span class="text-xl font-bold text-stone-300">/</span>
                <span class="text-awakin-sun font-black text-md">{{ carbsGoal() }}g</span>
            </div>
            <span class="text-[9px] text-awakin-stone uppercase font-bold tracking-wider">Carbos</span>
            <div class="w-8 h-1 rounded-full bg-awakin-sun mt-1 opacity-50 transition-all duration-500"></div>
        </div>

        <div class="flex flex-col items-center">
            <div class="flex items-baseline h-8">
                <span class="text-xl font-black text-gray-600 tracking-tighter tabular-nums me-1">
                    {{ fatsEated() }}
                </span>
                <span class="text-xl font-bold text-stone-300">/</span>
                <span class="text-module-avatar font-black text-md">{{ fatsGoal() }}g</span>
            </div>
            <span class="text-[9px] text-awakin-stone uppercase font-bold tracking-wider">Grasas</span>
            <div class="w-8 h-1 rounded-full bg-module-avatar mt-1 opacity-50 transition-all duration-500"></div>
        </div>
    </div>

<div class="relative w-full flex justify-center items-center overflow-visible px-2 pt-6 pb-4 flex-col max-h-[100px]">
    <svg viewBox="0 0 320 60" class="overflow-visible w-full h-auto drop-shadow-md" xmlns="http://www.w3.org/2000/svg">

        <path #scalePath id="mainCurve" d="M3 10C3 10 78 40 160 40C242 40 317 10 317 10" fill="none"
            stroke="transparent" />

        <path d="M3 10C3 10 78 40 160 40C242 40 317 10 317 10" fill="none" stroke="#F5F5F4" stroke-width="10"
            stroke-linecap="round" />

        <path d="M3 10C3 10 78 40 160 40C242 40 317 10 317 10" fill="none" stroke="#FE970A" stroke-width="10"
            stroke-linecap="round" [attr.stroke-dasharray]="getStrokeDash(totalEated())"
            class="transition-all duration-1000 ease-out" />

        <path d="M3 10C3 10 78 40 160 40C242 40 317 10 317 10" fill="none" stroke="#F51212" stroke-width="6"
            stroke-linecap="round" [attr.stroke-dasharray]="getStrokeDash(burnedKcals())"
            class="transition-all duration-1000 ease-out delay-200" />

        <g [attr.transform]="getMarkerTransform(targetGoal())" class="transition-all duration-700">
            <line x1="0" y1="-15" x2="0" y2="15" stroke="#93918B" stroke-width="2" stroke-dasharray="3 2" />
            <text x="0" y="28" text-anchor="middle" fill="#93918B"
                class="text-[9px] font-black uppercase tracking-widest">Goal</text>
        </g>
    </svg>
</div>

    <div class="flex justify-between items-center px-2">
        <div class="flex flex-col items-start">
            <span class="text-[8px] font-black text-stone-400 uppercase tracking-widest">Eated (kcal)</span>
            <div class="flex items-baseline gap-1">
                <span class="text-lg font-black text-gray-800 tabular-nums tracking-tighter">{{ (proteinEated()*4) + (carbsEated()*4) + (fatsEated()*9) }}</span>
                <div class="w-1.5 h-1.5 rounded-full bg-module-intake/20 border border-module-intake/40"></div>
            </div>
        </div>

        <div class="flex flex-col items-end">
            <span class="text-[8px] font-black text-stone-400 uppercase tracking-widest">Burned (kcal)</span>
            <div class="flex items-baseline gap-1">
                <div class="w-1.5 h-1.5 rounded-full bg-awakin-sun/20 border border-awakin-sun/40"></div>
                <span class="text-lg font-black text-gray-800 tabular-nums tracking-tighter">{{ burnedKcals() }}</span>
            </div>
        </div>
    </div>

</div>

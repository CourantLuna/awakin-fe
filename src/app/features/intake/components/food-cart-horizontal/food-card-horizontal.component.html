<div class="group flex items-center p-3 mb-3 bg-white rounded-2xl border transition-all duration-300 relative gap-3"
    [ngClass]="food().isLogged ? 'border-stone-100 shadow-sm hover:shadow-md' : 'border-stone-200 border-dashed bg-stone-50/50 opacity-90'">

    <div class="w-12 h-12 rounded-xl flex items-center justify-center text-2xl shrink-0 transition-all duration-300"
        [ngClass]="food().isLogged ? 'bg-awakin-surface/50' : 'bg-stone-100 grayscale opacity-70'">
        {{ food().emoji }}
    </div>

    <div class="flex-1 min-w-0 flex flex-col justify-center gap-1">

        <h4 class="font-bold text-sm truncate transition-all duration-300 leading-none"
            [ngClass]="food().isLogged ? 'text-stone-800' : 'text-stone-500'">
            {{ food().name }}
        </h4>

        <div class="flex items-center flex-wrap gap-1.5 text-[10px] font-bold tracking-wide transition-all duration-300"
            [ngClass]="food().isLogged ? 'text-stone-600' : 'text-stone-400/70'">
            <span [ngClass]="food().isLogged ? 'text-stone-800' : 'text-stone-500'">
                {{ food().kcal }} <span class="font-medium text-[9px] uppercase opacity-70">kcal</span>
            </span>
            <span class="opacity-30">&bull;</span>
            <span>{{ food().protein }}<span class="font-normal opacity-70">P</span></span>
            <span class="opacity-30">&bull;</span>
            <span>{{ food().carbs }}<span class="font-normal opacity-70">C</span></span>
            <span class="opacity-30">&bull;</span>
            <span>{{ food().fat }}<span class="font-normal opacity-70">G</span></span>
        </div>

        <div class="flex items-center gap-2 mt-0.5 relative">
            <button (click)="onToggleMenu.emit($event)"
                class="flex items-center gap-1 px-1.5 py-0.5 rounded text-[9px] font-bold uppercase tracking-wider transition-colors relative z-30"
                [ngClass]="food().isLogged ? 'bg-awakin-sun/10 text-awakin-sun hover:bg-awakin-sun/20' : 'bg-stone-200 text-stone-500 hover:bg-stone-300'">
                {{ food().category }}
                <i class="pi pi-angle-down text-[8px] transition-transform duration-300"
                    [ngClass]="{'rotate-180': isOpen()}"></i>
            </button>

            @if (isOpen()) {
            <div
                class="absolute top-full left-0 mt-1.5 w-28 bg-white rounded-xl shadow-[0_8px_30px_rgb(0,0,0,0.12)] border border-stone-100 py-1 z-40 flex flex-col origin-top animate-fade-in-down">
                @for (cat of categories(); track cat) {
                <button (click)="onChangeCategory.emit({ category: cat, event: $event })"
                    class="px-3 py-2 text-left text-[10px] font-bold uppercase tracking-wider transition-colors"
                    [ngClass]="cat === food().category ? 'text-awakin-sun bg-awakin-sun/5' : 'text-stone-500 hover:bg-stone-50 hover:text-stone-800'">
                    <span class="flex items-center gap-1.5">
                        <i class="pi pi-check text-[8px]"
                            [ngClass]="cat === food().category ? 'opacity-100' : 'opacity-0'"></i>
                        {{ cat }}
                    </span>
                </button>
                }
            </div>
            }

            <span class="text-[10px] font-medium text-stone-400">
                {{ food().portion }} {{ food().unit }}
            </span>
        </div>
    </div>

    <button (click)="onToggleLog.emit()"
        class="w-7 h-7 shrink-0 rounded-full flex items-center justify-center transition-all duration-300 focus:outline-none relative "
        [ngClass]="food().isLogged ? 'bg-module-intake text-white shadow-md border border-module-intake' : 'border-2 border-dashed border-stone-300 text-transparent hover:border-module-intake bg-transparent'">
        <i class="pi pi-check text-xs font-bold transition-all duration-300 absolute"
            [ngClass]="{'opacity-100 scale-100': food().isLogged, 'opacity-0 scale-50': !food().isLogged}"></i>
    </button>

</div>

<div class="min-h-screen bg-awakin-base pb-20">

  <div class="w-full bg-white">
  
  <p-toolbar styleClass="bg-transparent border-none p-0 mb-3">
    
    <ng-template pTemplate="start">
      <button (click)="calendar.onMenuClick.emit()" 
              class="w-10 h-10 flex items-center justify-center text-black active:opacity-40 transition-all">
        <i class="pi pi-ellipsis-h text-xl"></i>
      </button>
    </ng-template>

    <ng-template pTemplate="center">
      <div class="flex items-center gap-1">
        
        <button (click)="calendar.navigate(-1)" 
                class="w-8 h-8 flex items-center justify-center rounded-full hover:bg-stone-100 active:scale-90 transition-all text-stone-400 hover:text-black">
          <i class="pi pi-chevron-left text-xs"></i>
        </button>

        <button (click)="handleTopBtnAction()" 
                class="flex items-center gap-2 px-5 py-2 rounded-full border border-stone-200 bg-stone-50 active:scale-95 transition-all shadow-sm group">
          <i class="pi pi-calendar text-sm text-awakin-sun group-hover:rotate-12 transition-transform"></i>
          <span class="text-sm font-bold tracking-wide capitalize text-gray-800 min-w-[70px] text-center">
            {{ currentLabel() }}
          </span>
          <i class="pi pi-chevron-down text-[10px] text-stone-400"></i>
        </button>

        <button (click)="calendar.navigate(1)" 
                class="w-8 h-8 flex items-center justify-center rounded-full hover:bg-stone-100 active:scale-90 transition-all text-stone-400 hover:text-black">
          <i class="pi pi-chevron-right text-xs"></i>
        </button>

      </div>
    </ng-template>

    <ng-template pTemplate="end">
      <div class="flex items-center gap-1.5 pr-2">
        <i class="pi pi-bolt text-xl" 
           [ngClass]="streak() > 0 ? 'text-awakin-sun animate-pulse' : 'text-stone-300'"></i>
        <span class="text-xl font-bold font-mono" 
              [ngClass]="streak() > 0 ? 'text-black' : 'text-stone-400'">
          {{ streak() }}
        </span>
      </div>
    </ng-template>

  </p-toolbar>

  <app-week-calendar-header 
    [streak]="streak()"
    (onLabelChange)="updateLabel($event)"
   >
  </app-week-calendar-header>

</div>

  <!-- 2. CONTENIDO PRINCIPAL (Dashboard de Comida) -->
  <div class="px-4 pt-5 z-10">

    <div class="bg-white rounded-3xl p-6 shadow-xl border border-stone-100 relative overflow-hidden mb-6 ">
<app-intake-progress-widget [consumed]="caloriesConsumed()" [minA]="minBasal()" [goalB]="targetGoal()"
  [maintC]="maintenanceLevel()">
</app-intake-progress-widget>
<!-- GRÁFICO CENTRAL -->
<div class=" flex justify-center items-center mb-2 md:-mt-12 -mt-2">
  <!-- El Chart -->
  <p-chart type="doughnut" [data]="macroData" [options]="macroOptions" class="md:w-48 md:h-48 w-22 h-22"></p-chart>
</div>

  <!-- DESGLOSE DE MACROS -->
  <div class="grid grid-cols-3 gap-4  ">
    <!-- Proteína -->
    <div class="flex flex-col items-center ">
      <div class="flex items-baseline h-8">
        <span class="text-xl font-black text-gray-600 tracking-tighter tabular-nums me-1">
          70
        </span>
        <span class="text-xl font-bold text-stone-300">/</span>
            <span class="text-module-intake font-black text-md">120g</span>

      </div>
      <span class="text-[9px] text-awakin-stone uppercase font-bold tracking-wider">Proteína</span>
      <div class="w-8 h-1 rounded-full bg-module-intake mt-1 opacity-50"></div>
    </div>
    <!-- Carbos -->
    <div class="flex flex-col items-center   px-2">
      <div class="flex items-baseline h-8">
        <span class="text-xl font-black text-gray-600 tracking-tighter tabular-nums me-1">
          105
        </span>
        <span class="text-xl font-bold text-stone-300">/</span>
        <span class="text-awakin-sun font-black text-md">210g</span>
      
      </div>
      <span class="text-[9px] text-awakin-stone uppercase font-bold tracking-wider">Carbos</span>
      <div class="w-8 h-1 rounded-full bg-awakin-sun mt-1 opacity-50"></div>
    </div>
    <!-- Grasas -->
    <div class="flex flex-col items-center ">
      <div class="flex items-baseline h-8">
        <span class="text-xl font-black text-gray-600 tracking-tighter tabular-nums me-1">
          105
        </span>
        <span class="text-xl font-bold text-stone-300">/</span>
        <span class="text-module-avatar font-black text-md">45g</span>
      
      </div>
      <span class="text-[9px] text-awakin-stone uppercase font-bold tracking-wider">Grasas</span>
      <div class="w-8 h-1 rounded-full bg-module-avatar mt-1 opacity-50"></div>
    </div>
  </div>

    <div class="relative w-full flex justify-center items-center  overflow-visible px-2 pt-4 flex-col">
      <svg class="z-2 " width="1" height="35" viewBox="0 0 1 35" fill="none" xmlns="http://www.w3.org/2000/svg">
        <line x1="0.5" x2="0.5" y2="34.5455" stroke="#93918B" stroke-dasharray="2 2" />
      </svg>

      <svg viewBox="0 0 320 80" class="absolute top-3 drop-shadow-sm gap-2 flex pb-2"
        xmlns="http://www.w3.org/2000/svg">
        <path
          d="M3.00098 3.00085C3.00098 3.00085 78.2732 28.8145 159.607 28.9099C241.377 29.0059 316.213 3.00082 316.213 3.00082"
          stroke="#FE970A" stroke-width="7" stroke-linecap="round" fill="none" />
        
          
      </svg>

      <svg viewBox="0 0 320 80" class="absolute top-1 drop-shadow-sm gap-2 flex pb-2" xmlns="http://www.w3.org/2000/svg">
        <path
          d="M3.00098 3.00085C3.00098 3.00085 78.2732 28.8145 159.607 28.9099C241.377 29.0059 316.213 3.00082 316.213 3.00082"
          stroke="#F51212" stroke-width="6" stroke-linecap="round" fill="none" />
      
      
      </svg>

    

      
    </div>

    

    </div>

  
    <!-- BOTÓN DE ACCIÓN PRINCIPAL -->
    <button
      class="w-full bg-awakin-sun hover:bg-awakin-sun-dim text-white rounded-2xl p-4 flex items-center justify-center gap-3 shadow-lg shadow-orange-500/30 transition-all active:scale-95 mb-8 group">
      <div
        class="bg-white/20 rounded-full w-8 h-8 flex items-center justify-center group-hover:rotate-90 transition-transform">
        <i class="pi pi-plus text-lg font-bold"></i>
      </div>
      <span class="font-bold tracking-wide">REGISTRAR COMIDA</span>
    </button>

    <!-- LISTA DE COMIDAS -->
    <section>
      <h3 class="font-bold text-gray-700 mb-4 px-1 flex justify-between items-center">
        <span>Comidas de Hoy</span>
        <span class="text-xs text-awakin-stone font-normal">3 registros</span>
      </h3>

      <!-- Item Comida 1 -->
      <div
        class="bg-white hover:bg-stone-50 transition-colors rounded-2xl p-4 flex items-center gap-4 border border-stone-100 mb-3 cursor-pointer group shadow-sm">
        <div
          class="w-12 h-12 bg-awakin-surface rounded-xl flex items-center justify-center text-2xl group-hover:scale-110 transition-transform">
          🍳
        </div>
        <div class="flex-1">
          <h4 class="font-bold text-gray-800 text-sm">Huevos con Aguacate</h4>
          <div class="flex items-center gap-2 mt-1">
            <span class="text-[10px] bg-stone-100 text-stone-500 px-1.5 rounded">Desayuno</span>
            <p class="text-xs text-awakin-stone font-medium">450 kcal</p>
          </div>
        </div>
        <i class="pi pi-chevron-right text-stone-300 group-hover:text-awakin-sun transition-colors"></i>
      </div>

      <!-- Item Comida 2 (Planificado) -->
      <div
        class="bg-white/60 border-2 border-dashed border-stone-200 rounded-2xl p-4 flex items-center gap-4 mb-3 opacity-80">
        <div class="w-12 h-12 bg-stone-50 rounded-xl flex items-center justify-center text-2xl opacity-50 grayscale">
          🥗
        </div>
        <div class="flex-1">
          <h4 class="font-bold text-stone-400 text-sm italic">Almuerzo Planificado</h4>
          <p class="text-xs text-awakin-stone">Toca: Pollo con Quinoa</p>
        </div>
        <button
          class="text-awakin-sun font-bold text-[10px] border border-awakin-sun px-3 py-1 rounded-full hover:bg-awakin-sun hover:text-white transition-colors">
          REGISTRAR
        </button>
      </div>
    </section>

  </div>
</div>

<div class="min-h-screen bg-awakin-base pb-20">

  <div class="w-full bg-white">
  
  <p-toolbar styleClass="bg-transparent border-none p-0 mb-3">
    
    <ng-template pTemplate="start">
      <button (click)="calendar.onMenuClick.emit()" 
              class="w-10 h-10 flex items-center justify-center text-black active:opacity-40 transition-all">
        <i class="pi pi-ellipsis-h text-xl"></i>
      </button>
    </ng-template>

    <ng-template pTemplate="center">
      <div class="flex items-center gap-1">
        
        <button (click)="calendar.navigate(-1)" 
                class="w-8 h-8 flex items-center justify-center rounded-full hover:bg-stone-100 active:scale-90 transition-all text-stone-400 hover:text-black">
          <i class="pi pi-chevron-left text-xs"></i>
        </button>

        

      <div
        class="flex items-center rounded-full border border-stone-200 bg-stone-50 shadow-sm overflow-hidden transition-all">
      
        <button (click)="handleTopBtnAction()"
          class="flex items-center gap-1 pl-5 pe-2 py-2 active:bg-stone-100 transition-colors group border-r border-stone-200">
          <i class="pi pi-calendar text-sm text-awakin-sun group-hover:rotate-12 transition-transform"></i>
          <span class="text-sm font-bold tracking-wide capitalize text-gray-800 min-w-[60px] text-center">
            {{ currentLabel() }}
          </span>
        </button>
      
        <button (click)="toggleCalendarViewMode()"
          class="px-4 py-2 hover:bg-stone-100 active:bg-stone-200 transition-colors flex items-center justify-center group">
          <i class="pi pi-chevron-down inline-block transform 0.3s ease-in-out text-[10px] text-stone-400 group-hover:text-awakin-sun transition-all"
           [ngClass]="{'rotate-180': calendar.viewMode()=== 'month'}"
          ></i>
        </button>
      
      </div>

        <button (click)="calendar.navigate(1)" 
                class="w-8 h-8 flex items-center justify-center rounded-full hover:bg-stone-100 active:scale-90 transition-all text-stone-400 hover:text-black">
          <i class="pi pi-chevron-right text-xs"></i>
        </button>

      </div>
    </ng-template>

    <ng-template pTemplate="end">
      <div class="flex items-center gap-1.5 pr-2">
        <i class="pi pi-bolt text-xl" 
           [ngClass]="streak() > 0 ? 'text-awakin-sun animate-pulse' : 'text-stone-300'"></i>
        <span class="text-xl font-bold font-mono" 
              [ngClass]="streak() > 0 ? 'text-black' : 'text-stone-400'">
          {{ streak() }}
        </span>
      </div>
    </ng-template>

  </p-toolbar>

  <app-week-calendar-header 
    [streak]="streak()"
    [weekStart]="1"
    (onLabelChange)="updateLabel($event)"
   >
  </app-week-calendar-header>

</div>

  <!-- 2. CONTENIDO PRINCIPAL (Dashboard de Comida) -->
  <div class="px-4 pt-5 z-10">

<app-intake-scale-widget 
[minA]="minBasal()" 
[maintC]="maintenanceLevel()" 
[proteinEated]="70" [proteinGoal]="120" 
[carbsEated]="105" [carbsGoal]="210"
[fatsEated]="45" [fatsGoal]="60" 
[burnedKcals]="220"
[kinData]="{ name: 'Alpha Kin', logo: 'wolf-icon.png' }">
</app-intake-scale-widget>
  
    <!-- BOTÓN DE ACCIÓN PRINCIPAL -->
    <button
      class="w-full bg-awakin-sun hover:bg-awakin-sun-dim text-white rounded-2xl p-4 flex items-center justify-center gap-3 shadow-lg shadow-orange-500/30 transition-all active:scale-95 mb-8 group">
      <div
        class="bg-white/20 rounded-full w-8 h-8 flex items-center justify-center group-hover:rotate-90 transition-transform">
        <i class="pi pi-plus text-lg font-bold"></i>
      </div>
      <span class="font-bold tracking-wide">REGISTRAR COMIDA</span>
    </button>

    <!-- LISTA DE COMIDAS -->
    <section>
      <h3 class="font-bold text-gray-700 mb-4 px-1 flex justify-between items-center">
        <span>Comidas de Hoy</span>
        <span class="text-xs text-awakin-stone font-normal">3 registros</span>
      </h3>

      <!-- Item Comida 1 -->
      <div
        class="bg-white hover:bg-stone-50 transition-colors rounded-2xl p-4 flex items-center gap-4 border border-stone-100 mb-3 cursor-pointer group shadow-sm">
        <div
          class="w-12 h-12 bg-awakin-surface rounded-xl flex items-center justify-center text-2xl group-hover:scale-110 transition-transform">
          🍳
        </div>
        <div class="flex-1">
          <h4 class="font-bold text-gray-800 text-sm">Huevos con Aguacate</h4>
          <div class="flex items-center gap-2 mt-1">
            <span class="text-[10px] bg-stone-100 text-stone-500 px-1.5 rounded">Desayuno</span>
            <p class="text-xs text-awakin-stone font-medium">450 kcal</p>
          </div>
        </div>
        <i class="pi pi-chevron-right text-stone-300 group-hover:text-awakin-sun transition-colors"></i>
      </div>

      <!-- Item Comida 2 (Planificado) -->
      <div
        class="bg-white/60 border-2 border-dashed border-stone-200 rounded-2xl p-4 flex items-center gap-4 mb-3 opacity-80">
        <div class="w-12 h-12 bg-stone-50 rounded-xl flex items-center justify-center text-2xl opacity-50 grayscale">
          🥗
        </div>
        <div class="flex-1">
          <h4 class="font-bold text-stone-400 text-sm italic">Almuerzo Planificado</h4>
          <p class="text-xs text-awakin-stone">Toca: Pollo con Quinoa</p>
        </div>
        <button
          class="text-awakin-sun font-bold text-[10px] border border-awakin-sun px-3 py-1 rounded-full hover:bg-awakin-sun hover:text-white transition-colors">
          REGISTRAR
        </button>
      </div>
    </section>

  </div>
</div>
